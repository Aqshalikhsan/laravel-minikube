apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel
spec:
  replicas: 3   # 🔥 Sesuai permintaan tugas untuk scaling
  selector:
    matchLabels:
      app: laravel
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
      - name: laravel
        image: laravel-app
        imagePullPolicy: Never # Pakai 'Never' agar Minikube wajib pakai image hasil load lokal
        env:
        - name: APP_KEY
          value: "base64:YqjdF1bGVUMpr+XnH52lPc0nKkUXot7NxXuOXRCE8po="
        - name: DB_HOST
          value: mysql
        - name: DB_DATABASE
          value: laravel_k8s # Sesuaikan dengan isi mysql.yaml
        - name: DB_USERNAME
          value: root
        - name: DB_PASSWORD
          value: "rootpassword"          # Kosongkan jika di mysql.yaml pakai ALLOW_EMPTY_PASSWORD
        ports:
        - containerPort: 80
        
---
apiVersion: v1
kind: Service
metadata:
  name: laravel-nodeport
spec:
  type: NodePort
  selector:
    app: laravel
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007